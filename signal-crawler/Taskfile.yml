version: '3'

tasks:
  default:
    desc: "Show help"
    cmds:
      - task: build

  build:
    desc: "Build the signal-crawler binary"
    sources:
      - "**/*.go"
      - "go.mod"
      - "go.sum"
      - "../infrastructure/**/*.go"
    generates:
      - "bin/signal-crawler"
    cmds:
      - mkdir -p bin
      - go build -o bin/signal-crawler main.go

  run:
    desc: "Run signal-crawler (all adapters)"
    deps: [build]
    cmds:
      - ./bin/signal-crawler

  run:dry:
    desc: "Dry run — print signals without POSTing"
    deps: [build]
    cmds:
      - ./bin/signal-crawler --dry-run {{.CLI_ARGS}}

  test:
    desc: "Run all tests"
    sources:
      - "**/*.go"
      - "go.mod"
      - "go.sum"
      - "../infrastructure/**/*.go"
    cmds:
      - go test -v ./...

  test:cover:
    desc: "Run tests with coverage and race detector"
    cmds:
      - go test -race -coverprofile=coverage.out -count=1 ./...
      - go tool cover -func=coverage.out

  lint:
    desc: "Lint the Go code"
    sources:
      - "**/*.go"
      - "go.mod"
      - "go.sum"
      - "../.golangci.yml"
      - "../infrastructure/**/*.go"
    cmds:
      - go fmt ./...
      - go vet ./...
      - golangci-lint run --config ../.golangci.yml ./...

  clean:
    desc: "Clean build artifacts"
    cmds:
      - rm -rf bin/
      - rm -f data/seen.db
