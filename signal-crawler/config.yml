northops:
  # NorthOps ingest API base URL (required)
  # Override with NORTHOPS_URL env var
  url: ""
  # API key for machine-to-machine authentication (required)
  # Override with PIPELINE_API_KEY env var
  api_key: ""

dedup:
  # Path to SQLite deduplication database
  # Override with SIGNAL_DB_PATH env var
  db_path: "data/seen.db"

logging:
  # Log level: debug, info, warn, error
  # Override with LOG_LEVEL env var
  level: "info"
  # Log format: json, console
  # Override with LOG_FORMAT env var
  format: "json"

# Hacker News adapter
hn:
  max_items: 200        # Max stories to scan per run (env: HN_MAX_ITEMS)
  base_url: ""          # Leave empty for production Firebase URL (env: HN_BASE_URL)

# Funding adapter
funding:
  urls:                 # Grant portal URLs to scrape
    - "https://otf.ca/our-grants/grants-awarded"

# Playwright renderer (for JS-heavy pages)
renderer:
  url: ""              # Leave empty for default localhost:8095 (env: RENDERER_URL)
  enabled: false       # Set true in prod with renderer available (env: RENDERER_ENABLED)

# Job boards adapter
jobs:
  remoteok_url: ""       # Leave empty for default (env: JOBS_REMOTEOK_URL)
  wwr_url: ""            # Leave empty for default (env: JOBS_WWR_URL)
  hn_max_comments: 200   # Max HN hiring thread comments to scan (env: JOBS_HN_MAX_COMMENTS)
  gcjobs_url: ""         # Leave empty for default (env: JOBS_GCJOBS_URL)
  workbc_url: ""         # Leave empty for default (env: JOBS_WORKBC_URL)
