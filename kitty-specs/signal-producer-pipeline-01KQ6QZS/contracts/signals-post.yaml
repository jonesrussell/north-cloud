openapi: 3.0.3
info:
  title: Waaseyaa Signal Ingest (Consumer Contract)
  version: "1.0.0"
  description: |
    Consumer contract for the Waaseyaa `POST /api/signals` endpoint as used by
    the North Cloud signal-producer service. The receiver is owned by Waaseyaa
    (separate repo); this document captures the shape the producer targets and
    the test server validates against. Source of truth: issue #594.
servers:
  - url: https://northops.ca
    description: Production
  - url: http://localhost:8080
    description: Local test server (httptest.Server) for unit and integration tests

paths:
  /api/signals:
    post:
      summary: Ingest a batch of signals from a producer
      operationId: ingestSignals
      security:
        - ApiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SignalBatch"
            example:
              signals:
                - signal_type: "rfp"
                  external_id: "nc-rfp-AbC123"
                  source: "north-cloud"
                  source_url: "https://canadabuys.canada.ca/example"
                  label: "Bridge construction services"
                  strength: 78
                  organization_name: "Government of Canada"
                  sector: "Construction"
                  province: "ON"
                  expires_at: "2026-05-15T17:00:00Z"
                  payload: { _id: "AbC123", title: "Bridge construction services", quality_score: 78 }
      responses:
        "200":
          description: Batch ingested. The producer treats any 2xx as success and advances the checkpoint.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IngestResult"
              example:
                ingested: 3
                skipped: 1
                leads_created: 1
                leads_matched: 2
                unmatched: 0
        "400":
          description: Client-side error (malformed payload, missing required fields). Producer does NOT retry. Run exits non-zero. Operator must investigate.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Missing or invalid API key. Producer does NOT retry; surfaces a clear startup-config error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "5XX":
          description: Server-side transient. Producer retries up to 3 times with backoff 1s, 5s, 15s.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-Api-Key

  schemas:
    SignalBatch:
      type: object
      required: [signals]
      properties:
        signals:
          type: array
          minItems: 1
          maxItems: 500
          items:
            $ref: "#/components/schemas/Signal"

    Signal:
      type: object
      required:
        - signal_type
        - external_id
        - source
        - source_url
        - label
        - strength
        - organization_name
        - sector
        - province
        - payload
      properties:
        signal_type:
          type: string
          description: For RFP hits this is literal "rfp". For need_signal hits this is the value of `need_signal.signal_type` from the source ES document.
        external_id:
          type: string
          description: Globally unique within `source`. Prefixed `nc-rfp-{esId}` or `nc-sig-{esId}` to prevent collisions across content types.
          pattern: "^nc-(rfp|sig)-.+"
        source:
          type: string
          enum: ["north-cloud"]
        source_url:
          type: string
          format: uri
        label:
          type: string
          maxLength: 500
        strength:
          type: integer
          minimum: 0
          maximum: 100
        organization_name:
          type: string
        sector:
          type: string
        province:
          type: string
        expires_at:
          type: string
          format: date-time
          description: Present for RFP signals when `rfp.closing_date` is available. Omitted otherwise.
        payload:
          type: object
          description: The full ES hit, passed through opaquely.

    IngestResult:
      type: object
      required: [ingested, skipped, leads_created, leads_matched, unmatched]
      properties:
        ingested:
          type: integer
          minimum: 0
        skipped:
          type: integer
          minimum: 0
        leads_created:
          type: integer
          minimum: 0
        leads_matched:
          type: integer
          minimum: 0
        unmatched:
          type: integer
          minimum: 0

    Error:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
