pre-commit:
  parallel: true
  commands:
    go-fmt:
      glob: "**/*.go"
      run: |
        changed_services=""
        for f in {staged_files}; do
          svc=$(echo "$f" | cut -d/ -f1)
          if [ -f "$svc/go.mod" ] && ! echo "$changed_services" | grep -q "$svc"; then
            changed_services="$changed_services $svc"
          fi
        done
        for svc in $changed_services; do
          (cd "$svc" && GOWORK=off gofmt -l -w .)
        done
      stage_fixed: true

    go-lint:
      glob: "**/*.go"
      run: |
        changed_services=""
        for f in {staged_files}; do
          svc=$(echo "$f" | cut -d/ -f1)
          if [ -f "$svc/go.mod" ] && ! echo "$changed_services" | grep -q "$svc"; then
            changed_services="$changed_services $svc"
          fi
        done
        for svc in $changed_services; do
          echo "Linting $svc..."
          (cd "$svc" && GOWORK=off golangci-lint run --config ../.golangci.yml ./...)
        done

    dashboard-lint:
      glob: "dashboard/**/*.{ts,tsx,vue,js}"
      run: cd dashboard && npm run lint

pre-push:
  parallel: true
  commands:
    go-test:
      glob: "**/*.go"
      run: |
        changed_services=""
        for f in {push_files}; do
          svc=$(echo "$f" | cut -d/ -f1)
          if [ -f "$svc/go.mod" ] && ! echo "$changed_services" | grep -q "$svc"; then
            changed_services="$changed_services $svc"
          fi
        done
        for svc in $changed_services; do
          echo "Testing $svc..."
          (cd "$svc" && GOWORK=off go test ./... -count=1)
        done
