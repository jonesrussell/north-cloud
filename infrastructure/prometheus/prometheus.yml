global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'classifier'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['classifier:8071']

  - job_name: 'publisher'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['publisher:8070']

  - job_name: 'search'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['search:8090']

  - job_name: 'index-manager'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['index-manager:8090']

  - job_name: 'auth'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['auth:8040']
