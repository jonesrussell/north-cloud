version: '3'

vars:
  BINARY_NAME: social-publisher
  MAIN_PATH: ./main.go

env:
  GOWORK: "off"
  GOFLAGS: "-mod=mod"

tasks:
  build:
    desc: "Build the social-publisher binary"
    cmds:
      - go build -o bin/{{.BINARY_NAME}} {{.MAIN_PATH}}

  run:
    desc: "Run the social-publisher service"
    cmds:
      - go run {{.MAIN_PATH}}

  test:
    desc: "Run all tests"
    cmds:
      - go test -v ./...

  test:coverage:
    desc: "Run tests with coverage"
    cmds:
      - go test -coverprofile=coverage.out ./...
      - go tool cover -html=coverage.out -o coverage.html

  lint:
    desc: "Lint the Go code"
    cmds:
      - go fmt ./...
      - go vet ./...
      - golangci-lint run --config ../.golangci.yml ./...

  lint:no-cache:
    desc: "Lint with clean cache"
    cmds:
      - go fmt ./...
      - go vet ./...
      - golangci-lint cache clean
      - golangci-lint run --config ../.golangci.yml ./...

  tidy:
    desc: "Tidy go.mod"
    cmds:
      - go mod tidy

  vendor:
    desc: "Sync vendor directory"
    cmds:
      - go mod vendor
