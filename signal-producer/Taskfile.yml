version: '3'

# signal-producer: stateless oneshot. Reads ES → maps → POSTs to Waaseyaa.
# See kitty-specs/signal-producer-pipeline-01KQ6QZS/spec.md for the mission spec.

tasks:
  default:
    desc: "Show available tasks"
    cmds:
      - task --list

  build:
    desc: "Build the signal-producer binary"
    sources:
      - "**/*.go"
      - "go.mod"
      - "go.sum"
      - "../infrastructure/**/*.go"
    generates:
      - "bin/signal-producer"
    cmds:
      - mkdir -p bin
      - go build -o bin/signal-producer ./cmd/...

  run:
    desc: "Run signal-producer (one-shot)"
    deps: [build]
    cmds:
      - ./bin/signal-producer

  test:
    desc: "Run all tests"
    sources:
      - "**/*.go"
      - "go.mod"
      - "go.sum"
      - "../infrastructure/**/*.go"
    cmds:
      - go test -v ./...

  test:cover:
    desc: "Run tests with coverage and race detector"
    cmds:
      - go test -race -coverprofile=coverage.out -count=1 ./...
      - go tool cover -func=coverage.out

  test:race:
    desc: "Run tests with race detector"
    cmds:
      - go test -race ./...

  lint:
    desc: "Lint the Go code"
    sources:
      - "**/*.go"
      - "go.mod"
      - "go.sum"
      - "../.golangci.yml"
      - "../infrastructure/**/*.go"
    cmds:
      - go fmt ./...
      - go vet ./...
      - golangci-lint run --config ../.golangci.yml ./...

  lint:no-cache:
    desc: "Lint with clean cache (matches CI)"
    cmds:
      - go fmt ./...
      - go vet ./...
      - golangci-lint cache clean
      - golangci-lint run --config ../.golangci.yml ./...

  vuln:
    desc: "Run vulnerability check"
    sources:
      - "go.mod"
      - "go.sum"
    cmds:
      - govulncheck ./...

  vendor:
    desc: "Sync vendor directory (run after go get or go mod tidy)"
    cmds:
      - go mod vendor

  tidy:
    desc: "Tidy go.mod and go.sum"
    cmds:
      - go mod tidy

  clean:
    desc: "Clean build artifacts"
    cmds:
      - rm -rf bin/
      - rm -f coverage.out coverage.html
