name: Deploy to Production

on:
  workflow_run:
    workflows: ["Test"]
    types:
      - completed
  workflow_dispatch:
    inputs:
      force_rebuild_all:
        description: 'Force rebuild all services (ignore change detection)'
        required: false
        default: false
        type: boolean
      services:
        description: 'Comma-separated list of services to deploy (empty = auto-detect)'
        required: false
        default: ''
        type: string

env:
  REGISTRY: docker.io
  IMAGE_PREFIX: jonesrussell

permissions:
  contents: write
  packages: write

jobs:
  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main')
    outputs:
      # JSON array of services to build
      services_matrix: ${{ steps.changes.outputs.services_matrix }}
      # Comma-separated list for deploy script
      services_list: ${{ steps.changes.outputs.services_list }}
      # Boolean flags for deploy decisions
      has_services: ${{ steps.changes.outputs.has_services }}
      has_infrastructure: ${{ steps.changes.outputs.has_infrastructure }}
      has_migrations: ${{ steps.changes.outputs.has_migrations }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed services
        id: changes
        env:
          # Use env vars to safely pass inputs (avoids injection risks)
          FORCE_ALL: ${{ inputs.force_rebuild_all }}
          MANUAL_SERVICES: ${{ inputs.services }}
          EVENT_NAME: ${{ github.event_name }}
          TRIGGER_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          # Determine head ref
          HEAD_REF="HEAD"
          if [ "$EVENT_NAME" = "workflow_run" ] && [ -n "$TRIGGER_SHA" ]; then
            HEAD_REF="$TRIGGER_SHA"
          fi

          # Use the 'deployed' tag as base ref if it exists.
          # This ensures we catch ALL changes since the last successful
          # deploy, not just the single commit that triggered this run.
          # If a previous deploy failed, its changes are included in the
          # next deploy's diff automatically.
          if git rev-parse --verify "deployed" >/dev/null 2>&1; then
            BASE_REF="deployed"
          elif [ "$EVENT_NAME" = "workflow_run" ] && [ -n "$TRIGGER_SHA" ]; then
            BASE_REF="${TRIGGER_SHA}^1"
          else
            BASE_REF="HEAD~1"
          fi

          echo "=== Detection Summary ==="
          echo "BASE_REF: $BASE_REF ($(git rev-parse --short "$BASE_REF" 2>/dev/null || echo 'unknown'))"
          echo "HEAD_REF: $HEAD_REF ($(git rev-parse --short "$HEAD_REF" 2>/dev/null || echo 'unknown'))"
          echo ""

          # Use shared detection script with deploy format
          # Script reads FORCE_ALL, MANUAL_SERVICES, and HEAD_REF from env
          export HEAD_REF
          ./scripts/detect-changed-services.sh "$BASE_REF" --format=deploy | tee /dev/stderr >> $GITHUB_OUTPUT

  build-and-push:
    name: Build ${{ matrix.service.name }}
    needs: detect-changes
    if: needs.detect-changes.outputs.has_services == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.detect-changes.outputs.services_matrix) }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service.name }}
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.service.context }}
          file: ${{ matrix.service.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: |
            type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service.name }}:buildcache
            type=gha,scope=${{ matrix.service.name }}
          cache-to: |
            type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service.name }}:buildcache,mode=max
            type=gha,scope=${{ matrix.service.name }},mode=max
          build-args: |
            BUILD_ENV=production
            ${{ matrix.service.build_args }}

  deploy:
    name: Deploy to Production
    needs: [detect-changes, build-and-push]
    # Run if services were built OR if only infrastructure changed
    if: |
      always() &&
      needs.detect-changes.result == 'success' &&
      (needs.build-and-push.result == 'success' || needs.build-and-push.result == 'skipped') &&
      (needs.detect-changes.outputs.has_services == 'true' || needs.detect-changes.outputs.has_infrastructure == 'true')
    runs-on: ubuntu-latest
    env:
      CHANGED_SERVICES: ${{ needs.detect-changes.outputs.services_list }}
      INFRA_CHANGED: ${{ needs.detect-changes.outputs.has_infrastructure }}
      MIGRATIONS_CHANGED: ${{ needs.detect-changes.outputs.has_migrations }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Add server to known hosts
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_SSH_PORT: ${{ secrets.DEPLOY_SSH_PORT || '22' }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          ssh-keyscan -H -p "${DEPLOY_SSH_PORT}" "${DEPLOY_HOST}" >> ~/.ssh/known_hosts 2>/dev/null
          chmod 600 ~/.ssh/known_hosts

      - name: Validate migration prefixes
        run: |
          echo "Checking for duplicate migration prefixes..."
          FOUND_DUPES=false
          for dir in */migrations/; do
            [ -d "$dir" ] || continue
            dupes=$(ls "$dir" 2>/dev/null | grep -E '\.up\.sql$' | sed 's/_.*//' | sort | uniq -d)
            if [ -n "$dupes" ]; then
              echo "::error::Duplicate migration prefixes in $dir: $dupes"
              FOUND_DUPES=true
            fi
          done
          if [ "$FOUND_DUPES" = true ]; then
            echo "::error::Deploy aborted — fix duplicate migration prefixes before deploying."
            exit 1
          fi
          echo "No duplicate migration prefixes found."

      - name: Sync files to server
        env:
          SSH_PORT: ${{ secrets.DEPLOY_SSH_PORT || 22 }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
        run: |
          tar -czf /tmp/deploy-files.tar.gz \
            docker-compose.base.yml \
            docker-compose.prod.yml \
            scripts/deploy.sh \
            infrastructure/ \
            */migrations/ \
            --exclude='*.md' \
            --exclude='*.txt' \
            2>/dev/null || true

          scp -P "${SSH_PORT}" /tmp/deploy-files.tar.gz "${DEPLOY_USER}@${DEPLOY_HOST}:/tmp/"

          ssh -p "${SSH_PORT}" "${DEPLOY_USER}@${DEPLOY_HOST}" '
            cd /home/deployer/north-cloud
            # Remove stale files before extracting (tar only adds, never deletes).
            # Migrations: prevents duplicate prefix crashes in golang-migrate.
            # Infrastructure configs: prevents renamed/removed configs from persisting.
            find . -maxdepth 2 -path "*/migrations/*.sql" -delete 2>/dev/null || true
            find ./infrastructure -type f \( -name "*.yml" -o -name "*.yaml" -o -name "*.conf" -o -name "*.alloy" -o -name "*.json" \) -delete 2>/dev/null || true
            tar -xzf /tmp/deploy-files.tar.gz
            rm /tmp/deploy-files.tar.gz
            chmod +x scripts/deploy.sh 2>/dev/null || chmod +x deploy.sh 2>/dev/null || true
            [ -f scripts/deploy.sh ] && mv scripts/deploy.sh deploy.sh
          '

      - name: Update image tag manifest
        env:
          SSH_PORT: ${{ secrets.DEPLOY_SSH_PORT || 22 }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_SHA: ${{ github.event.workflow_run.head_sha || github.sha }}
        run: |
          SHORT_SHA=$(echo "${DEPLOY_SHA}" | cut -c1-7)
          TAG="sha-${SHORT_SHA}"

          # Update image-tags.env on the server for changed services only.
          # Each service gets its own _TAG variable; unchanged services keep
          # their previous tag. Compose reads these via ${SERVICE_TAG:-latest}.
          ssh -p "${SSH_PORT}" "${DEPLOY_USER}@${DEPLOY_HOST}" "
            cd /home/deployer/north-cloud
            touch image-tags.env

            for svc in ${CHANGED_SERVICES//,/ }; do
              # Convert service name to env var: lowercase-hyphen → UPPER_SNAKE_TAG
              VAR=\$(echo \"\${svc}\" | tr '[:lower:]-' '[:upper:]_')_TAG
              # Remove old entry and append new one
              grep -v \"^\${VAR}=\" image-tags.env > image-tags.env.tmp || true
              mv image-tags.env.tmp image-tags.env
              echo \"\${VAR}=${TAG}\" >> image-tags.env
            done

            echo 'Updated image-tags.env:'
            cat image-tags.env
          "

      - name: Deploy services
        env:
          SSH_PORT: ${{ secrets.DEPLOY_SSH_PORT || 22 }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
        run: |
          ssh -p "${SSH_PORT}" "${DEPLOY_USER}@${DEPLOY_HOST}" "
            cd /home/deployer/north-cloud

            # Export variables for deploy script
            export CHANGED_SERVICES='${CHANGED_SERVICES}'
            export INFRA_CHANGED='${INFRA_CHANGED}'
            export MIGRATIONS_CHANGED='${MIGRATIONS_CHANGED}'

            # Source per-service image tags (e.g. CRAWLER_TAG=sha-abc1234)
            # Unchanged services keep their previous tag; missing vars
            # fall back to 'latest' via \${SERVICE_TAG:-latest} in compose.
            if [ -f image-tags.env ]; then
              set -a
              . ./image-tags.env
              set +a
            fi

            # Run optimized deploy
            bash deploy.sh
          "

      - name: Tag successful deploy
        env:
          DEPLOY_SHA: ${{ github.event.workflow_run.head_sha || github.sha }}
        run: |
          # Move the 'deployed' tag to the commit that was just deployed.
          # Next deploy will diff from this tag, ensuring no changes are
          # missed even if intermediate deploys failed.
          git tag -f deployed "$DEPLOY_SHA"
          git push -f origin deployed
          echo "Tagged $DEPLOY_SHA as 'deployed'"
