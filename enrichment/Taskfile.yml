version: '3'

env:
  GOWORK: off

tasks:
  default:
    desc: "Show available tasks"
    cmds:
      - task --list

  build:
    desc: "Build the enrichment binary"
    sources:
      - "**/*.go"
      - "go.mod"
      - "go.sum"
    generates:
      - "bin/enrichment"
    cmds:
      - mkdir -p bin
      - go build -o bin/enrichment ./cmd/...

  run:
    desc: "Run the enrichment service"
    cmds:
      - go run ./cmd/...

  test:
    desc: "Run all tests"
    sources:
      - "**/*.go"
      - "go.mod"
      - "go.sum"
    cmds:
      - go test -v ./...

  test:coverage:
    desc: "Run tests with coverage"
    cmds:
      - go test -coverprofile=coverage.out ./...
      - go tool cover -func=coverage.out

  test:race:
    desc: "Run tests with race detector"
    cmds:
      - go test -race ./...

  lint:
    desc: "Lint the Go code"
    cmds:
      - go fmt ./...
      - go vet ./...
      - golangci-lint run --config ../.golangci.yml ./...

  lint:no-cache:
    desc: "Lint with clean cache"
    cmds:
      - go fmt ./...
      - go vet ./...
      - golangci-lint cache clean
      - golangci-lint run --config ../.golangci.yml ./...

  vuln:
    desc: "Run vulnerability check"
    cmds:
      - govulncheck ./...

  vendor:
    desc: "Sync vendor directory (run after go get or go mod tidy)"
    cmds:
      - go mod vendor

  tidy:
    desc: "Tidy module dependencies"
    cmds:
      - go mod tidy

  clean:
    desc: "Clean build artifacts"
    cmds:
      - rm -rf bin/
      - rm -f coverage.out coverage.html
