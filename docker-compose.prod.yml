# ============================================================
# Production Defaults (DRY)
# ============================================================

x-prod-defaults: &prod-defaults
  networks:
    - north-cloud-network
  restart: always

# ============================================================
# Application Services - Production
# ============================================================

services:

  # ------------------------------------------------------------
  # Crawler (Prod)
  # ------------------------------------------------------------
  crawler:
    <<: *prod-defaults
    image: docker.io/jonesrussell/crawler:latest
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1G
    depends_on:
      postgres-crawler:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      minio:
        condition: service_healthy
      source-manager:
        condition: service_healthy
      render-worker:
        condition: service_healthy
    environment:
      POSTGRES_CRAWLER_HOST: postgres-crawler
      POSTGRES_CRAWLER_PORT: 5432
      POSTGRES_CRAWLER_USER: "${POSTGRES_CRAWLER_USER}"
      POSTGRES_CRAWLER_PASSWORD: "${POSTGRES_CRAWLER_PASSWORD}"
      POSTGRES_CRAWLER_DB: "${POSTGRES_CRAWLER_DB:-crawler}"
      POSTGRES_CRAWLER_SSLMODE: disable
      ELASTICSEARCH_ADDRESSES: http://elasticsearch:9200
      CRAWLER_SOURCES_API_URL: http://source-manager:8050/api/v1/sources
      SOURCE_MANAGER_URL: http://source-manager:8050
      CRAWLER_SAVE_DISCOVERED_LINKS: "${CRAWLER_SAVE_DISCOVERED_LINKS:-false}"
      CRAWLER_MINIO_ENABLED: "${CRAWLER_MINIO_ENABLED:-false}"
      CRAWLER_MINIO_ENDPOINT: "${CRAWLER_MINIO_ENDPOINT:-minio:9000}"
      CRAWLER_MINIO_ACCESS_KEY: "${CRAWLER_MINIO_ACCESS_KEY:-}"
      CRAWLER_MINIO_SECRET_KEY: "${CRAWLER_MINIO_SECRET_KEY:-}"
      CRAWLER_MINIO_USE_SSL: "${CRAWLER_MINIO_USE_SSL:-false}"
      CRAWLER_MINIO_BUCKET: "${CRAWLER_MINIO_BUCKET:-html-archives}"
      CRAWLER_MINIO_METADATA_BUCKET: "${CRAWLER_MINIO_METADATA_BUCKET:-crawler-metadata}"
      # Job Logs Configuration
      JOB_LOGS_ENABLED: "${JOB_LOGS_ENABLED:-true}"
      JOB_LOGS_BUFFER_SIZE: "${JOB_LOGS_BUFFER_SIZE:-1000}"
      JOB_LOGS_SSE_ENABLED: "${JOB_LOGS_SSE_ENABLED:-true}"
      JOB_LOGS_ARCHIVE_ENABLED: "${JOB_LOGS_ARCHIVE_ENABLED:-true}"
      JOB_LOGS_RETENTION_DAYS: "${JOB_LOGS_RETENTION_DAYS:-30}"
      JOB_LOGS_MIN_LEVEL: "${JOB_LOGS_MIN_LEVEL:-info}"
      JOB_LOGS_MINIO_BUCKET: "${JOB_LOGS_MINIO_BUCKET:-crawler-logs}"
      JOB_LOGS_MILESTONE_INTERVAL: "${JOB_LOGS_MILESTONE_INTERVAL:-50}"
      # Redis Streams for Job Logs (v2 SSE endpoint)
      JOB_LOGS_REDIS_ENABLED: "${JOB_LOGS_REDIS_ENABLED:-true}"
      JOB_LOGS_REDIS_KEY_PREFIX: "${JOB_LOGS_REDIS_KEY_PREFIX:-logs}"
      JOB_LOGS_REDIS_TTL_SECONDS: "${JOB_LOGS_REDIS_TTL_SECONDS:-86400}"
      # Interval Scheduler (legacy Colly-based — disabled by default, frontier + feed poller handles all crawling)
      CRAWLER_SCHEDULER_ENABLED: "${CRAWLER_SCHEDULER_ENABLED:-false}"
      # Frontier Worker Pool + Feed Poller
      CRAWLER_FEED_POLL_ENABLED: "${CRAWLER_FEED_POLL_ENABLED:-true}"
      CRAWLER_FEED_DISCOVERY_ENABLED: "${CRAWLER_FEED_DISCOVERY_ENABLED:-true}"
      CRAWLER_FEED_DISCOVERY_INTERVAL_MINUTES: "${CRAWLER_FEED_DISCOVERY_INTERVAL_MINUTES:-60}"
      CRAWLER_FEED_DISCOVERY_RETRY_HOURS: "${CRAWLER_FEED_DISCOVERY_RETRY_HOURS:-168}"
      FETCHER_ENABLED: "${FETCHER_ENABLED:-true}"
      FETCHER_WORKER_COUNT: "${FETCHER_WORKER_COUNT:-16}"
      FETCHER_STALE_TIMEOUT: "${FETCHER_STALE_TIMEOUT:-10m}"
      FETCHER_STALE_CHECK_INTERVAL: "${FETCHER_STALE_CHECK_INTERVAL:-2m}"
      PIPELINE_URL: http://pipeline:8075
      APP_ENV: production
      AUTH_JWT_SECRET: "${AUTH_JWT_SECRET}"
      AUTH_INTERNAL_SECRET: "${AUTH_INTERNAL_SECRET:-}"
      SERVER_SECURITY_ENABLED: "false"
      SERVER_PORT: "8080"
      REDIS_ADDRESS: "${REDIS_HOST:-redis}:6379"
      REDIS_PASSWORD: "${REDIS_PASSWORD:-}"
      # Crawler Redis Storage (Colly visited URLs persistence)
      CRAWLER_REDIS_STORAGE_ENABLED: "${CRAWLER_REDIS_STORAGE_ENABLED:-false}"
      CRAWLER_REDIS_STORAGE_EXPIRES: "${CRAWLER_REDIS_STORAGE_EXPIRES:-168h}"
      # Proxy Pool (IP rotation via Squid)
      CRAWLER_PROXY_POOL_ENABLED: "${CRAWLER_PROXY_POOL_ENABLED:-false}"
      CRAWLER_PROXY_POOL_URLS: "${CRAWLER_PROXY_POOL_URLS:-}"
      CRAWLER_PROXY_STICKY_TTL: "${CRAWLER_PROXY_STICKY_TTL:-10m}"
      # Playwright Render Worker
      CRAWLER_RENDER_WORKER_URL: "${CRAWLER_RENDER_WORKER_URL:-http://render-worker:3000}"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ------------------------------------------------------------
  # AI Observer (Prod)
  # ------------------------------------------------------------
  ai-observer:
    <<: *prod-defaults
    image: docker.io/jonesrussell/ai-observer:latest
    restart: on-failure

  # ------------------------------------------------------------
  # Squid Proxy (IP Rotation)
  # ------------------------------------------------------------
  # network_mode: host gives Squid direct access to Reserved IPs
  # on the host's network interfaces for outbound binding.
  # Config and logs are mounted from the host.
  squid:
    image: ubuntu/squid:latest
    container_name: north-cloud-squid
    network_mode: host
    restart: always
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M
    volumes:
      - /opt/north-cloud/squid/squid.conf:/etc/squid/squid.conf:ro
      - /opt/north-cloud/squid/logs:/var/log/squid
    healthcheck:
      test: ["CMD-SHELL", "squid -k check 2>/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ------------------------------------------------------------
  # Source Manager (Prod)
  # ------------------------------------------------------------
  source-manager:
    <<: *prod-defaults
    image: docker.io/jonesrussell/source-manager:latest
    ports:
      - "127.0.0.1:8050:8050"
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
    depends_on:
      postgres-source-manager:
        condition: service_healthy
    environment:
      APP_DEBUG: "false"
      APP_ENV: production
      SERVER_HOST: "${SOURCE_MANAGER_HOST:-0.0.0.0}"
      SERVER_PORT: "${SOURCE_MANAGER_PORT:-8050}"
      DB_HOST: postgres-source-manager
      DB_PORT: 5432
      DB_USER: "${POSTGRES_SOURCE_MANAGER_USER}"
      DB_PASSWORD: "${POSTGRES_SOURCE_MANAGER_PASSWORD}"
      DB_NAME: "${POSTGRES_SOURCE_MANAGER_DB:-source_manager}"
      DB_SSLMODE: disable
      VERIFICATION_AI_ENABLED: "${VERIFICATION_AI_ENABLED:-false}"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
      ANTHROPIC_MODEL: "${ANTHROPIC_MODEL:-claude-haiku-4-5-20251001}"
    volumes:
      - ./source-manager/migrations:/migrations:ro
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:8050/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ------------------------------------------------------------
  # Publisher (Prod) - Unified API and Router
  # ------------------------------------------------------------
  publisher:
    <<: *prod-defaults
    image: docker.io/jonesrussell/publisher:latest
    command: ["/app/publisher", "both"]
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 512M
    depends_on:
      postgres-publisher:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    environment:
      POSTGRES_PUBLISHER_HOST: postgres-publisher
      POSTGRES_PUBLISHER_PORT: 5432
      POSTGRES_PUBLISHER_USER: "${POSTGRES_PUBLISHER_USER}"
      POSTGRES_PUBLISHER_PASSWORD: "${POSTGRES_PUBLISHER_PASSWORD}"
      POSTGRES_PUBLISHER_DB: "${POSTGRES_PUBLISHER_DB:-publisher}"
      POSTGRES_PUBLISHER_SSLMODE: disable
      PUBLISHER_PORT: 8070
      ES_URL: http://elasticsearch:9200
      REDIS_URL: ${REDIS_HOST:-redis}:6379
      REDIS_PASSWORD: "${REDIS_PASSWORD:-}"
      PUBLISHER_ROUTER_CHECK_INTERVAL: "${PUBLISHER_ROUTER_CHECK_INTERVAL:-5m}"
      PUBLISHER_ROUTER_BATCH_SIZE: "${PUBLISHER_ROUTER_BATCH_SIZE:-100}"
      PIPELINE_URL: http://pipeline:8075
      AUTH_JWT_SECRET: "${AUTH_JWT_SECRET}"
      GIN_MODE: release
      APP_DEBUG: "false"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:8070/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 25s

  # ------------------------------------------------------------
  # Classifier (Prod)
  # ------------------------------------------------------------
  classifier:
    <<: *prod-defaults
    image: docker.io/jonesrussell/classifier:latest
    command: ["./classifier", "both"]
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1G
    depends_on:
      postgres-classifier:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      crime-ml:
        condition: service_healthy
      mining-ml:
        condition: service_healthy
      coforge-ml:
        condition: service_healthy
      entertainment-ml:
        condition: service_healthy
      indigenous-ml:
        condition: service_healthy
    environment:
      POSTGRES_HOST: postgres-classifier
      POSTGRES_PORT: 5432
      POSTGRES_USER: "${POSTGRES_CLASSIFIER_USER}"
      POSTGRES_PASSWORD: "${POSTGRES_CLASSIFIER_PASSWORD}"
      POSTGRES_DB: "${POSTGRES_CLASSIFIER_DB:-classifier}"
      POSTGRES_SSLMODE: disable
      ELASTICSEARCH_URL: http://elasticsearch:9200
      ES_URL: http://elasticsearch:9200
      REDIS_URL: ${REDIS_HOST:-redis}:6379
      REDIS_PASSWORD: "${REDIS_PASSWORD:-}"
      APP_DEBUG: "false"
      APP_ENV: production
      CLASSIFIER_PORT: 8070
      CRIME_ENABLED: "true"
      CRIME_ML_SERVICE_URL: http://crime-ml:8080
      MINING_ENABLED: "true"
      MINING_ML_SERVICE_URL: http://mining-ml:8080
      COFORGE_ENABLED: "true"
      COFORGE_ML_SERVICE_URL: http://coforge-ml:8080
      ENTERTAINMENT_ENABLED: "true"
      ENTERTAINMENT_ML_SERVICE_URL: http://entertainment-ml:8080
      INDIGENOUS_ENABLED: "${INDIGENOUS_ENABLED:-false}"
      INDIGENOUS_ML_SERVICE_URL: http://indigenous-ml:8080
      RFP_ENABLED: "true"
      PIPELINE_URL: http://pipeline:8075
      AUTH_INTERNAL_SECRET: "${AUTH_INTERNAL_SECRET:-}"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8070/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 25s

  # ------------------------------------------------------------
  # Crime ML Classifier (Prod)
  # ------------------------------------------------------------
  crime-ml:
    <<: *prod-defaults
    image: docker.io/jonesrussell/crime-ml:latest
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1:8080/v1/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ------------------------------------------------------------
  # Mining ML Classifier (Prod)
  # ------------------------------------------------------------
  mining-ml:
    <<: *prod-defaults
    image: docker.io/jonesrussell/mining-ml:latest
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1:8080/v1/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ------------------------------------------------------------
  # Coforge ML Classifier (Prod)
  # ------------------------------------------------------------
  coforge-ml:
    <<: *prod-defaults
    image: docker.io/jonesrussell/coforge-ml:latest
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1:8080/v1/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ------------------------------------------------------------
  # Entertainment ML Classifier (Prod)
  # ------------------------------------------------------------
  entertainment-ml:
    <<: *prod-defaults
    image: docker.io/jonesrussell/entertainment-ml:latest
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1:8080/v1/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ------------------------------------------------------------
  # Indigenous ML Classifier (Prod)
  # ------------------------------------------------------------
  indigenous-ml:
    <<: *prod-defaults
    image: docker.io/jonesrussell/indigenous-ml:latest
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1:8080/v1/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ------------------------------------------------------------
  # Pipeline (Prod)
  # ------------------------------------------------------------
  pipeline:
    <<: *prod-defaults
    image: docker.io/jonesrussell/pipeline:latest
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
    depends_on:
      postgres-pipeline:
        condition: service_healthy
    environment:
      POSTGRES_PIPELINE_HOST: postgres-pipeline
      POSTGRES_PIPELINE_PORT: 5432
      POSTGRES_PIPELINE_USER: "${POSTGRES_PIPELINE_USER}"
      POSTGRES_PIPELINE_PASSWORD: "${POSTGRES_PIPELINE_PASSWORD}"
      POSTGRES_PIPELINE_DB: "${POSTGRES_PIPELINE_DB:-pipeline}"
      POSTGRES_PIPELINE_SSLMODE: disable
      PIPELINE_PORT: 8075
      AUTH_JWT_SECRET: "${AUTH_JWT_SECRET}"
      APP_DEBUG: "false"
      GIN_MODE: release
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:8075/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ------------------------------------------------------------
  # Index Manager (Prod)
  # ------------------------------------------------------------
  index-manager:
    <<: *prod-defaults
    image: docker.io/jonesrussell/index-manager:latest
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
    depends_on:
      postgres-index-manager:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    environment:
      INDEX_MANAGER_PORT: 8090
      POSTGRES_INDEX_MANAGER_HOST: postgres-index-manager
      POSTGRES_INDEX_MANAGER_PORT: 5432
      POSTGRES_INDEX_MANAGER_USER: "${POSTGRES_INDEX_MANAGER_USER}"
      POSTGRES_INDEX_MANAGER_PASSWORD: "${POSTGRES_INDEX_MANAGER_PASSWORD}"
      POSTGRES_INDEX_MANAGER_DB: "${POSTGRES_INDEX_MANAGER_DB:-index_manager}"
      ELASTICSEARCH_URL: http://elasticsearch:9200
      CONFIG_PATH: /root/config.yml
      APP_DEBUG: "false"
      APP_ENV: production
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:8090/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ------------------------------------------------------------
  # Search Service (Prod)
  # ------------------------------------------------------------
  search-service:
    <<: *prod-defaults
    image: docker.io/jonesrussell/search-service:latest
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
    depends_on:
      elasticsearch:
        condition: service_healthy
    environment:
      APP_DEBUG: "false"
      SEARCH_PORT: 8090
      SEARCH_DEBUG: "false"
      ELASTICSEARCH_URL: http://elasticsearch:9200
      ELASTICSEARCH_USERNAME: "${ELASTICSEARCH_USERNAME:-}"
      ELASTICSEARCH_PASSWORD: "${ELASTICSEARCH_PASSWORD:-}"
      LOG_LEVEL: "${SEARCH_LOG_LEVEL:-info}"
      LOG_FORMAT: "${SEARCH_LOG_FORMAT:-json}"
      CORS_ORIGINS: "${CORS_ORIGINS:-*}"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:8090/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ------------------------------------------------------------
  # Search Frontend (Prod)
  # ------------------------------------------------------------
  search-frontend:
    <<: *prod-defaults
    image: docker.io/jonesrussell/search-frontend:latest
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M
    depends_on:
      search-service:
        condition: service_healthy
    environment:
      NODE_ENV: production
      SEARCH_API_URL: http://search-service:8090

  # ------------------------------------------------------------
  # nc-http-proxy (Prod) - HTTP replay proxy for crawler
  # ------------------------------------------------------------
  nc-http-proxy:
    <<: *prod-defaults
    image: docker.io/jonesrussell/nc-http-proxy:latest
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M
    ports:
      - "${PROXY_PORT:-8055}:8055"
    environment:
      PROXY_PORT: "8055"
      PROXY_MODE: "${PROXY_MODE:-replay}"
      PROXY_FIXTURES_DIR: /app/fixtures
      PROXY_CACHE_DIR: /app/cache
      PROXY_CERT_FILE: /app/certs/proxy.crt
      PROXY_KEY_FILE: /app/certs/proxy.key
    volumes:
      - ./crawler/fixtures:/app/fixtures:ro
      - nc_http_proxy_cache:/app/cache
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8055/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  # ------------------------------------------------------------
  # Auth (Prod)
  # ------------------------------------------------------------
  auth:
    <<: *prod-defaults
    image: docker.io/jonesrussell/auth:latest
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M
    environment:
      AUTH_USERNAME: "${AUTH_USERNAME}"
      AUTH_PASSWORD: "${AUTH_PASSWORD}"
      AUTH_JWT_SECRET: "${AUTH_JWT_SECRET}"
      AUTH_PORT: 8040
      APP_DEBUG: "false"
      APP_ENV: production
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8040/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ------------------------------------------------------------
  # MCP North Cloud (Prod) - stdio server for Cursor/Claude
  # Connect from host: docker exec -i <container> /app/mcp-north-cloud
  # ------------------------------------------------------------
  mcp-north-cloud:
    <<: *prod-defaults
    image: docker.io/jonesrussell/mcp-north-cloud:latest
    # MCP server is stdio-based: connect via `docker exec -i <container> /app/mcp-north-cloud`
    # The container idles so the binary is available for on-demand connections.
    command: ["sleep", "infinity"]
    depends_on:
      crawler:
        condition: service_healthy
      source-manager:
        condition: service_healthy
      publisher:
        condition: service_healthy
      classifier:
        condition: service_healthy
      search-service:
        condition: service_healthy
      index-manager:
        condition: service_healthy
    environment:
      CRAWLER_URL: http://crawler:8080
      SOURCE_MANAGER_URL: http://source-manager:8050
      PUBLISHER_URL: http://publisher:8070
      CLASSIFIER_URL: http://classifier:8070
      SEARCH_URL: http://search-service:8090
      INDEX_MANAGER_URL: http://index-manager:8090
      GRAFANA_URL: http://grafana:3000
      GRAFANA_USERNAME: "${GRAFANA_ADMIN_USER:-admin}"
      GRAFANA_PASSWORD: "${GRAFANA_ADMIN_PASSWORD}"
      AUTH_JWT_SECRET: "${AUTH_JWT_SECRET}"
      MCP_ENV: prod
      OLLAMA_URL: "${OLLAMA_URL:-}"
      OLLAMA_MODEL: "${OLLAMA_MODEL:-qwen3:4b}"
      RENDERER_URL: "http://playwright-renderer:8095"

  # ------------------------------------------------------------
  # Playwright Renderer Sidecar (Prod) — JS rendering for fetch_url MCP tool
  # Optional: only needed when fetch_url is called with js_render=true
  # ------------------------------------------------------------
  playwright-renderer:
    <<: *prod-defaults
    image: docker.io/jonesrussell/playwright-renderer:latest
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1:8095/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ------------------------------------------------------------
  # Dashboard (Prod)
  # ------------------------------------------------------------
  dashboard:
    <<: *prod-defaults
    image: docker.io/jonesrussell/dashboard:latest
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
    depends_on:
      auth:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1:80/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ------------------------------------------------------------
  # Nginx Reverse Proxy (Prod)
  # ------------------------------------------------------------
  nginx:
    <<: *prod-defaults
    image: nginx:alpine
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128M
    ports:
      - "127.0.0.1:${NGINX_HTTP_PORT:-8080}:80"
      - "127.0.0.1:${NGINX_HTTPS_PORT:-8443}:443"
    volumes:
      - ./infrastructure/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infrastructure/nginx/certs:/etc/nginx/certs:ro
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ============================================================
  # PostgreSQL (Prod Overrides — require .env, no defaults)
  # ============================================================
  postgres-source-manager:
    environment:
      POSTGRES_USER: "${POSTGRES_SOURCE_MANAGER_USER}"
      POSTGRES_PASSWORD: "${POSTGRES_SOURCE_MANAGER_PASSWORD}"

  postgres-crawler:
    environment:
      POSTGRES_USER: "${POSTGRES_CRAWLER_USER}"
      POSTGRES_PASSWORD: "${POSTGRES_CRAWLER_PASSWORD}"

  postgres-classifier:
    environment:
      POSTGRES_USER: "${POSTGRES_CLASSIFIER_USER}"
      POSTGRES_PASSWORD: "${POSTGRES_CLASSIFIER_PASSWORD}"

  postgres-index-manager:
    environment:
      POSTGRES_USER: "${POSTGRES_INDEX_MANAGER_USER}"
      POSTGRES_PASSWORD: "${POSTGRES_INDEX_MANAGER_PASSWORD}"

  postgres-publisher:
    environment:
      POSTGRES_USER: "${POSTGRES_PUBLISHER_USER}"
      POSTGRES_PASSWORD: "${POSTGRES_PUBLISHER_PASSWORD}"

  postgres-pipeline:
    environment:
      POSTGRES_USER: "${POSTGRES_PIPELINE_USER}"
      POSTGRES_PASSWORD: "${POSTGRES_PIPELINE_PASSWORD}"

  postgres-click-tracker:
    environment:
      POSTGRES_USER: "${POSTGRES_CLICK_TRACKER_USER}"
      POSTGRES_PASSWORD: "${POSTGRES_CLICK_TRACKER_PASSWORD}"

  # ============================================================
  # Click Tracker (Prod Overrides — require .env, no defaults)
  # ============================================================
  click-tracker:
    environment:
      POSTGRES_CLICK_TRACKER_USER: "${POSTGRES_CLICK_TRACKER_USER}"
      POSTGRES_CLICK_TRACKER_PASSWORD: "${POSTGRES_CLICK_TRACKER_PASSWORD}"

  # ============================================================
  # MinIO (Prod Overrides — require .env, no defaults)
  # ============================================================
  minio:
    environment:
      MINIO_ROOT_USER: "${MINIO_ROOT_USER}"
      MINIO_ROOT_PASSWORD: "${MINIO_ROOT_PASSWORD}"

  # ============================================================
  # Elasticsearch (Prod Overrides)
  # ============================================================
  elasticsearch:
    deploy:
      resources:
        limits:
          cpus: "4"
          memory: 8G
    shm_size: 512mb
    environment:
      xpack.security.enabled: "${ELASTICSEARCH_SECURITY_ENABLED:-false}"
      ES_JAVA_OPTS: "-Xms${ELASTICSEARCH_MIN_HEAP:-4g} -Xmx${ELASTICSEARCH_MAX_HEAP:-4g}"

  # ============================================================
  # Redis (Prod Overrides)
  # ============================================================
  # Redis is disabled in production - using host Redis instead
  redis:
    profiles:
      - disabled

  # ============================================================
  # Logging Infrastructure (Prod)
  # ============================================================

  prometheus:
    restart: always

  pyroscope:
    restart: always
    volumes:
      - pyroscope_data:/var/lib/pyroscope
    environment:
      PYROSCOPE_LOG_LEVEL: info

  loki:
    restart: always
    volumes:
      - ./infrastructure/loki/loki-config.prod.yml:/etc/loki/config.yml:ro
      - loki_data:/loki
    environment:
      LOKI_LOG_LEVEL: info

  alloy:
    restart: always
    volumes:
      - ./infrastructure/alloy/config.alloy:/etc/alloy/config.alloy:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - alloy_data:/var/lib/alloy
      - /opt/north-cloud/squid/logs:/mnt/squid-logs:ro
      # Deployer sites - mount site roots so current/ symlink resolves across deploys
      - /home/deployer/streetcode-laravel:/mnt/sites/streetcode-laravel:ro
      - /home/deployer/orewire-laravel:/mnt/sites/orewire-laravel:ro
      - /home/deployer/coforge:/mnt/sites/coforge:ro
      - /home/deployer/movies-of-war.com:/mnt/sites/movies-of-war.com:ro
      - /home/deployer/oneredpaperclip:/mnt/sites/oneredpaperclip:ro
      - /home/deployer/diidjaaheer.live:/mnt/sites/diidjaaheer.live:ro
      - /home/deployer/northops:/mnt/sites/northops:ro
      - /home/deployer/goformx:/mnt/sites/goformx:ro
      - /home/deployer/minoo:/mnt/sites/minoo:ro
    environment:
      ALLOY_LOG_LEVEL: info

  grafana:
    restart: always
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infrastructure/grafana/provisioning:/etc/grafana/provisioning:ro
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_SECURITY_ADMIN_PASSWORD: "${GRAFANA_ADMIN_PASSWORD}"
      GF_SERVER_ROOT_URL: "https://northcloud.one/grafana/"
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
      GF_SECURITY_CSRF_TRUSTED_ORIGINS: "northcloud.one"
      # Comma-separated list only (e.g. grafana-clock-panel). Leave empty or unset for none.
      GF_INSTALL_PLUGINS: "${GRAFANA_INSTALL_PLUGINS:-}"
      GF_LOG_LEVEL: info
      # SendGrid SMTP for email alerts (port 2525 — VPS blocks 587)
      GF_SMTP_ENABLED: "true"
      GF_SMTP_HOST: "smtp.sendgrid.net:2525"
      GF_SMTP_PASSWORD: "${SENDGRID_API_KEY}"
      GF_SMTP_FROM_ADDRESS: "info@northcloud.one"
      GF_SMTP_FROM_NAME: "North Cloud Alerts"

  # ------------------------------------------------------------
  # RFP Ingestor
  # ------------------------------------------------------------

  rfp-ingestor:
    <<: *prod-defaults
    image: docker.io/jonesrussell/rfp-ingestor:latest
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
    depends_on:
      elasticsearch:
        condition: service_healthy
    environment:
      ELASTICSEARCH_URL: http://elasticsearch:9200
      RFP_INGESTOR_PORT: 8095
      RFP_POLL_INTERVAL_MINUTES: 120
      LOG_LEVEL: info

# ============================================================
# Production Volumes
# ============================================================
volumes:
  nc_http_proxy_cache:
    driver: local
  loki_data:
    driver: local
  alloy_data:
    driver: local
  grafana_data:
    driver: local
  prometheus_data:
    driver: local
  pyroscope_data:
    driver: local
